services:
  traefik:
    image: traefik
    container_name: traefik
    restart: always

    command:
      - "--api.dashboard=true"

      # Docker
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Redirection HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.email=${EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

      # DuckDNS Challenge
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=duckdns"

      # Logs utiles
      - "--log.level=DEBUG"

    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    networks:
      - web

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=myresolver"

      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"

    networks:
      - web

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: always

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=myresolver"

      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

    networks:
      - web

  blogverse-backend:
    image: 6330360/tp2-6330360-blogverse-backend:latest
    container_name: blogverse-backend
    restart: always

    networks:
      - web

  blogverse-frontend:
    image: 6330360/tp2-6330360-blogverse-frontend:latest
    container_name: blogverse-frontend
    restart: always

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.blogverse.rule=Host(`blog.${DOMAIN}`)"
      - "traefik.http.routers.blogverse.entrypoints=websecure"
      - "traefik.http.routers.blogverse.tls.certresolver=myresolver"

      - "traefik.http.services.blogverse.loadbalancer.server.port=80"

    networks:
      - web

networks:
  web:

volumes:
  portainer_data: