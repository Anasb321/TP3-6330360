services:

  traefik:
    image: traefik
    container_name: traefik
    restart: unless-stopped

    dns:
      - 8.8.8.8
      - 1.1.1.1

    command:
      # Logs
      - "--log.level=DEBUG"

      # Dashboard
      - "--api.insecure=true"

      # Docker
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # TLS
      - "--entrypoints.websecure.http.tls=true"

      # Let's Encrypt + DuckDNS
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=duckdns"

      # IMPORTANT pour DuckDNS
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.disablePropagationCheck=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"

      # Email + storage
      - "--certificatesresolvers.letsencrypt.acme.email=${EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

      # Certificats wildcard
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN}"

    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.service=api@internal"

  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer
    restart: unless-stopped

    networks:
      - web

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"

      - "traefik.http.routers.portainer.service=portainer"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    environment:
      - TZ=America/Montreal

    networks:
      - web

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"

      - "traefik.http.routers.jellyfin.service=jellyfin"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

    volumes:
      - "jellyfin_data:/config"

  blogverse-backend:
    image: 6330360/tp2-6330360-blogverse-backend:latest
    container_name: blogverse-backend
    restart: unless-stopped

    networks:
      - web

  blogverse-frontend:
    image: 6330360/tp2-6330360-blogverse-frontend:latest
    container_name: blogverse-frontend
    restart: unless-stopped

    networks:
      - web

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.blogverse.rule=Host(`blog.${DOMAIN}`)"
      - "traefik.http.routers.blogverse.entrypoints=websecure"

      - "traefik.http.routers.blogverse.service=blogverse"
      - "traefik.http.services.blogverse.loadbalancer.server.port=80"

networks:
  web:
    driver: bridge

volumes:
  portainer_data:
